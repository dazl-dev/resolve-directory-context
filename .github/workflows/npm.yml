name: npm
on:
  push:
    branches: [main]
jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org/'
      - run: npm ci
      - run: npx pleb@9 publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH }}
